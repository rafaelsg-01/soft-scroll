name: Release Please

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      version: ${{ steps.release-please.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Note: do NOT pass release-type input — release-please-action v4 does not
    # have a 'dotnet' release type. The strategy lives in release-please-config.json.
    - name: Run release-please
      id: release-please
      uses: googleapis/release-please-action@v4
      with:
        config-file: release-please-config.json
        target-branch: main

  # Note: GitHub Release is created by release-please action
  # The release workflow (build.yml) will be triggered by the release event
  # and upload the built artifact
