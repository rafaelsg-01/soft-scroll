name: Release Please

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      version: ${{ steps.release-please.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Note: pass release-type: simple at the action level — release-please-action
    # v4 requires this. The package-specific config (release-type: simple plus
    # extra-files for the csproj XML updaters) lives in release-please-config.json.
    - name: Run release-please
      id: release-please
      uses: googleapis/release-please-action@v4
      with:
        release-type: simple
        config-file: release-please-config.json
        manifest-file: .release-please-manifest.json
        target-branch: main

  # Note: GitHub Release is created by release-please action
  # The release workflow (build.yml) will be triggered by the release event
  # and upload the built artifact
