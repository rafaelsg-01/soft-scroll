name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest
    if: github.event_name != 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Publish
      run: dotnet publish -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=none -p:DebugSymbols=false -o ./dist

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SoftScroll
        path: ./dist/SoftScroll.exe

  release:
    runs-on: windows-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract version from tag
      id: version
      run: |
        $version = $env:GITHUB_REF_NAME -replace '^v', ''
        Write-Host "version=$version" >> $env:GITHUB_OUTPUT
        echo "version=$version"

    - name: Update version in files
      run: |
        # Single source of truth: read version from csproj so the workflow
        # never has to be edited when bumping versions. Only the Inno Setup
        # script needs a real value (its preprocessor runs at compile time
        # before it can read runtime metadata); SettingsWindow.xaml.cs
        # already reads the version from assembly attributes at runtime.
        $csproj = 'SmoothScrollClone.csproj'
        $version = (Select-String -Path $csproj -Pattern '<Version>([^<]+)</Version>' `
                     | Select-Object -First 1).Matches[0].Groups[1].Value
        Write-Host "Detected version from csproj: $version"

        # Update .iss (only file that still needs a hard-coded value)
        (Get-Content installer/SoftScroll.iss) -replace '#define MyAppVersion "[^"]+"', "#define MyAppVersion `"$version`"" | Set-Content installer/SoftScroll.iss

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Publish
      run: dotnet publish -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=none -p:DebugSymbols=false -o ./dist

    - name: Upload to Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $version = "${{ steps.version.outputs.version }}"
        gh release upload "v$version" ./dist/SoftScroll.exe --clobber
      shell: bash
